<!DOCTYPE html>
<html>
<head>

<title>NutriScan AI - Create Account</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{

min-height:100vh;
display:flex;
justify-content:center;
align-items:center;

padding:20px;

background:
radial-gradient(circle at top left,#00ff8840,transparent 35%),
radial-gradient(circle at bottom right,#00ff8840,transparent 35%),
#03140d;

color:white;

}


.signup-box{

width:100%;
max-width:400px;

padding:35px;

background:rgba(255,255,255,0.08);

border:1px solid rgba(255,255,255,0.15);

border-radius:30px;

backdrop-filter:blur(20px);

box-shadow:0 0 40px rgba(0,255,130,.25);

text-align:center;

}


.logo{

font-size:60px;

}


h1{

color:#35ff87;

margin:15px 0;

font-size:32px;

}


.subtitle{

color:#ccc;

margin-bottom:25px;

}



input{

width:100%;

padding:15px;

margin:8px 0;

border:none;

outline:none;

border-radius:18px;

background:#ffffff15;

color:white;

font-size:15px;

}


input::placeholder{

color:#aaa;

}



button{

width:100%;

padding:16px;

margin-top:15px;

border:none;

border-radius:20px;

background:#35ff87;

font-size:16px;

font-weight:bold;

}



.google{

background:white;

color:#333;

}



.divider{

margin:20px;

color:#aaa;

}



a{

color:#35ff87;

text-decoration:none;

}



.security{

margin-top:20px;

font-size:13px;

color:#aaa;

}


</style>

</head>


<body>


<div class="signup-box">


<div class="logo">
🥗
</div>


<h1>
Create Account
</h1>


<p class="subtitle">
Start your healthy journey with AI
</p>



<input type="text" placeholder="👤 Full Name">


<input type="email" placeholder="📧 Email Address">


<input type="password" placeholder="🔒 Create Password">


<input type="password" placeholder="🔐 Confirm Password">



<button>
CREATE ACCOUNT →
</button>



<div class="divider">
OR
</div>



<button class="google">
🔵 Continue with Google
</button>



<br><br>



<p>
Already have an account?
<a href="login.html">
Login
</a>
</p>



<div class="security">

🔒 Your health data is safe & protected

</div>



</div>


</body>
</html>
