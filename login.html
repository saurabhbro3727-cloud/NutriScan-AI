<!DOCTYPE html>
<html>
<head>
<title>NutriScan AI - Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{

height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;

background:
radial-gradient(circle at top left,#00ff8840,transparent 35%),
radial-gradient(circle at bottom right,#00ff8840,transparent 35%),
#03140d;

color:white;
}


/* floating glow */

body::before{
content:"";
position:absolute;
width:250px;
height:250px;
background:#00ff88;
filter:blur(120px);
top:10%;
left:10%;
animation:move 5s infinite alternate;
}


@keyframes move{
from{
transform:translate(0,0);
}
to{
transform:translate(100px,80px);
}
}



.login-box{

width:90%;
max-width:400px;

padding:40px 35px;

background:rgba(255,255,255,0.08);

border:1px solid rgba(255,255,255,0.15);

border-radius:30px;

backdrop-filter:blur(20px);

box-shadow:
0 0 40px rgba(0,255,130,.25);

text-align:center;

animation:show .8s;

}


@keyframes show{

from{
opacity:0;
transform:translateY(30px);
}

to{
opacity:1;
}

}


.logo{

font-size:65px;

}


h1{

font-size:34px;

margin:15px 0;

color:#35ff87;

}


.subtitle{

color:#ccc;

margin-bottom:30px;

font-size:16px;

}



input{

width:100%;

padding:16px;

margin:10px 0;

border-radius:18px;

border:none;

outline:none;

background:#ffffff15;

color:white;

font-size:16px;

}



input::placeholder{

color:#aaa;

}



.login-btn{

width:100%;

padding:16px;

margin-top:15px;

border:none;

border-radius:20px;

background:#35ff87;

font-size:17px;

font-weight:bold;

cursor:pointer;

}



.google{

background:white;

color:#333;

}



.divider{

margin:22px;

color:#aaa;

}



a{

color:#35ff87;

text-decoration:none;

font-weight:500;

}



.security{

margin-top:25px;

font-size:13px;

color:#aaa;

}



footer{

position:absolute;

bottom:20px;

font-size:13px;

color:#888;

}


</style>

</head>


<body>


<div class="login-box">


<div class="logo">
🥗
</div>


<h1>
NutriScan AI
</h1>


<p class="subtitle">
Welcome Back 👋<br>
Continue your healthy journey
</p>



<input 
type="email"
placeholder="📧 Email Address">



<input 
type="password"
placeholder="🔒 Password">



<button class="login-btn">
LOGIN →
</button>



<div class="divider">
OR
</div>



<button class="login-btn google">
🔵 Continue with Google
</button>



<br><br>


<a href="#">
Forgot Password?
</a>


<br><br>


<p>
Don't have an account?
<a href="#">
Create Account
</a>
</p>



<div class="security">
🔒 Your data is safe & protected
</div>



</div>



<footer>



</footer>


</body>
</html>
