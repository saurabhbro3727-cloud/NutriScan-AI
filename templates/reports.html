<!DOCTYPE html>
<html>
<head>

<title>NutriScan AI - Reports</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
min-height:100vh;
background:
radial-gradient(circle at top,#00ff8840,transparent 35%),
#03140d;
color:white;
padding:15px;
}


.container{
max-width:380px;
margin:auto;
}


h1{
color:#35ff87;
text-align:center;
font-size:28px;
margin:15px;
}


.card{

background:rgba(255,255,255,0.08);
padding:18px;
border-radius:22px;
margin-top:15px;

}


.card h2{

color:#35ff87;
margin-bottom:15px;

}


.item{

display:flex;
justify-content:space-between;
padding:12px 0;
border-bottom:1px solid #ffffff15;

}


.score{

font-size:40px;
color:#35ff87;
font-weight:bold;
text-align:center;

}


button{

width:100%;
margin-top:20px;
padding:14px;
border:none;
border-radius:18px;
background:#35ff87;
font-weight:bold;
font-size:16px;

}

</style>

</head>


<body>


<div class="container">


<h1>
📊 Reports
</h1>


<div class="card">

<h2>
Health Summary
</h2>

<div class="score">
86%
</div>

<p style="text-align:center">
Excellent Health Level 🟢
</p>

</div>



<div class="card">

<h2>
Recent Food Scans
</h2>


<div class="item">
🥗 Salad
<span>92%</span>
</div>


<div class="item">
🥜 Makhana
<span>90%</span>
</div>


<div class="item">
🍟 Chips
<span>58%</span>
</div>


<div class="item">
🥤 Coca Cola
<span>62%</span>
</div>


</div>



<button>
← Back Dashboard
</button>


</div>


</body>
</html>
