<!DOCTYPE html>
<html>
<head>

<title>NutriScan AI - Profile</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
min-height:100vh;

background:
radial-gradient(circle at top,#00ff8840,transparent 35%),
#03140d;

color:white;
padding:12px;
}


.container{
max-width:360px;
margin:auto;
text-align:center;
}


.profile-img{

width:70px;
height:70px;

background:#ffffff15;
border-radius:50%;

display:flex;
align-items:center;
justify-content:center;

font-size:35px;

margin:15px auto;

}


h1{

color:#35ff87;
font-size:24px;

}


.subtitle{

color:#aaa;
font-size:14px;

margin-top:5px;

}



.card{

background:rgba(255,255,255,0.08);

padding:14px;

border-radius:18px;

margin-top:15px;

text-align:left;

}



.card h2{

color:#35ff87;

font-size:20px;

margin-bottom:10px;

}



.item{

display:flex;

justify-content:space-between;

padding:9px 0;

font-size:14px;

border-bottom:1px solid #ffffff15;

}



button{

width:100%;

padding:12px;

margin-top:15px;

border:none;

border-radius:15px;

background:#35ff87;

font-size:15px;

font-weight:bold;

}



.logout{

background:#ff4d4d;

color:white;

}



</style>

</head>


<body>


<div class="container">


<div class="profile-img">
👤
</div>


<h1>Saurabh</h1>

<p class="subtitle">
NutriScan AI User
</p>



<div class="card">

<h2>Profile Details</h2>


<div class="item">
<span>📧 Email</span>
<span>user@gmail.com</span>
</div>


<div class="item">
<span>🥗 Total Scans</span>
<span>24</span>
</div>


<div class="item">
<span>❤️ Health Score</span>
<span>86%</span>
</div>


<div class="item">
<span>⭐ Membership</span>
<span>Premium</span>
</div>


</div>




<div class="card">

<h2>Settings</h2>


<div class="item">
<span>🔔 Notifications</span>
<span>ON</span>
</div>


<div class="item">
<span>🌙 Dark Mode</span>
<span>ON</span>
</div>


</div>



<button>
← Back Dashboard
</button>


<button class="logout">
Logout
</button>



</div>


</body>
</html>
